<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de receta en Cookit.">
  <link rel="icon" href="img/cookitLogoV.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <title>Cookit | Receta</title>
</head>

<body class="recipeDetailPage">
  <!-- Cabecera general -->
  <header>
    <div class="container">
      <a href="index.html"><img class="headerLogo" src="img/cookitLogoH.png" alt="Logotipo de Cookit" decoding="async"></a>
      <nav class="navBar">
        <a href="index.html">Inicio</a>
        <a href="recipes.html">Recetas</a>
        <button class="navTextButton" id="userButton" type="button">Login</button>
      </nav>
    </div>
  </header>

  <!-- Ficha de detalle de receta -->
  <main>
    <div class="container">
      <section class="recipeDetail" id="recipeDetail">
        <div class="detailMedia" id="detailMedia" aria-hidden="true"></div>
        <div class="detailContent">
          <div class="detailMainInfo">
            <h2 id="detailTitle">Titulo de receta</h2>
            <p class="sectionLead" id="detailDescription">Descripcion breve de la receta.</p>
            <div class="detailMetaRow">
              <span id="detailAuthor"></span>
              <span id="detailTime"></span>
              <span id="detailVotes"></span>
            </div>
            <div class="tags" id="detailTags"></div>
          </div>
          <div class="detailLists">
            <div>
              <h4>Ingredientes</h4>
              <ul id="detailIngredients"></ul>
            </div>
            <div>
              <h4>Pasos</h4>
              <ol id="detailSteps"></ol>
            </div>
          </div>
        </div>
      </section>
      <section class="recipeComments" aria-labelledby="commentsTitle">
        <h3 id="commentsTitle">Comentarios</h3>
        <form class="commentForm" id="mainCommentForm">
          <label for="mainCommentInput">Escribe un comentario</label>
          <textarea
            id="mainCommentInput"
            maxlength="1000"
            required
            placeholder="Comparte tu opinion o una duda sobre la receta..."
          ></textarea>
          <div class="commentActions">
            <button type="submit" class="primaryButton">Publicar comentario</button>
          </div>
        </form>
        <p class="commentFeedback" id="commentFeedback" aria-live="polite"></p>
        <div class="commentsList" id="commentsList"></div>
      </section>
    </div>
  </main>

  <!-- Pie de página -->
  <footer>
    <div class="container">
      <div class="footerLegalInfo">
        <h4>Informacion Legal</h4>
        <ul>
          <li><a href="">FAQS</a></li>
          <li><a href="">Aviso Legal</a></li>
        </ul>
      </div>
      <div class="footerContactInfo">
        <h4>Contacto</h4>
        <ul>
          <li><a href="">info@cookit.com</a></li>
          <li><a href="">+34 666554433</a></li>
        </ul>
      </div>
      <div class="imgSection">
        <img src="img/cookitLogoV.png" alt="Logotipo de Cookit." loading="lazy" decoding="async">
      </div>
    </div>
    <div class="footerCredits">
      <p>&copy; 2025 Todos los derechos reservados</p>
    </div>
  </footer>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
