<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Publica una nueva receta en Cookit.">
  <link rel="icon" href="img/cookitLogoV.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <title>Cookit | Nueva receta</title>
</head>

<body class="newRecipePage">
  <!-- Cabecera general -->
  <header>
    <div class="container">
      <a href="index.html"><img class="headerLogo" src="img/cookitLogoH.png" alt="Logotipo de Cookit" decoding="async"></a>
      <nav class="navBar">
        <a href="index.html">Inicio</a>
        <a href="recipes.html">Recetas</a>
        <button class="navTextButton" id="userButton" type="button">Login</button>
      </nav>
    </div>
  </header>

  <!-- Formulario de nueva receta -->
  <main>
    <div class="container">
      <section class="userPanel">
        <div class="userInfo">
          <h2 id="newRecipeTitle">Nueva receta</h2>
          <p class="sectionLead" id="newRecipeLead">Completa todos los campos para publicar tu receta.</p>
          <form class="newRecipeForm" id="newRecipeForm">
            <div class="formField full">
              <label for="newTitle">Título</label>
              <input id="newTitle" type="text" required placeholder="Ej. Pasta cremosa al pesto">
            </div>
            <div class="formField full">
              <label for="newTime">Tiempo</label>
              <input id="newTime" type="text" required placeholder="Ej. 30 min">
            </div>
            <div class="formField full">
              <label for="newDescription">Descripción</label>
              <textarea id="newDescription" required placeholder="Descripción breve de la receta"></textarea>
            </div>
            <div class="formField full" id="newImageField">
              <label for="newImage">Imagen de la receta</label>
              <input id="newImage" type="file" accept="image/*" required>
            </div>
            <div class="formField full">
              <label>Categorías</label>
              <div class="checkboxGroup" id="newCategories">
                <!--<label><input type="checkbox" value="rapidas"> Rápidas</label>
                <label><input type="checkbox" value="vegetarianas"> Vegetarianas</label>
                <label><input type="checkbox" value="sin_gluten"> Sin gluten</label>
                <label><input type="checkbox" value="postres"> Postres</label>
                <label><input type="checkbox" value="carnes"> Carnes</label>
                <label><input type="checkbox" value="saludable"> Saludable</label>-->
                <label><input type="checkbox" value="aperitivos"> Aperitivos</label>
                <label><input type="checkbox" value="entrantes"> Entrantes</label>
                <label><input type="checkbox" value="primeros_platos"> Primeros platos</label>
                <label><input type="checkbox" value="segundos_platos"> Segundos platos</label>
                <label><input type="checkbox" value="postres"> Postres</label>
                <label><input type="checkbox" value="condimentos_salsas"> Condimentos/Salsas</label>
              </div>
            </div>
            <div class="formField full">
              <label for="newIngredients">Ingredientes (uno por línea)</label>
              <textarea id="newIngredients" required placeholder="Ingrediente 1&#10;Ingrediente 2&#10;Ingrediente 3"></textarea>
            </div>
            <div class="formField full">
              <label for="newSteps">Pasos (uno por línea)</label>
              <textarea id="newSteps" required placeholder="Paso 1&#10;Paso 2&#10;Paso 3"></textarea>
            </div>
            <div class="newRecipeActions">
              <button type="submit" class="primaryButton" id="newRecipeSubmit">Publicar</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <!-- Pie de página -->
  <footer>
    <div class="container">
      <div class="footerLegalInfo">
        <h4>Informacion Legal</h4>
        <ul>
          <li><a href="">FAQS</a></li>
          <li><a href="">Aviso Legal</a></li>
        </ul>
      </div>
      <div class="footerContactInfo">
        <h4>Contacto</h4>
        <ul>
          <li><a href="">info@cookit.com</a></li>
          <li><a href="">+34 666554433</a></li>
        </ul>
      </div>
      <div class="imgSection">
        <img src="img/cookitLogoV.png" alt="Logotipo de Cookit." loading="lazy" decoding="async">
      </div>
    </div>
    <div class="footerCredits">
      <p>&copy; 2025 Todos los derechos reservados</p>
    </div>
  </footer>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
