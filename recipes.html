<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explora y filtra recetas de Cookit.">
  <link rel="icon" href="img/cookitLogoV.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <title>Cookit | Recetas</title>
</head>

<body class="recipesPage">
  <!-- Cabecera general -->
  <header>
    <div class="container">
      <a href="index.html"><img class="headerLogo" src="img/cookitLogoH.png" alt="Logotipo de Cookit" decoding="async"></a>
      <nav class="navBar">
        <a href="index.html">Inicio</a>
        <a href="recipes.html">Recetas</a>
        <button class="navTextButton" id="userButton" type="button">Login</button>
      </nav>
    </div>
  </header>

  <!-- Listado de recetas con filtros -->
  <main>
    <div class="container">
      <section class="filtersBar">
        <div class="searchField">
          <label for="searchInput">Busqueda</label>
          <input id="searchInput" type="text" placeholder="Buscar recetas por nombre o ingrediente...">
        </div>
        <div class="selectField">
          <label for="filterSelect">Filtrar</label>
          <select id="filterSelect">
            <!--<option value="">Todas las categorias</option>
            <option value="rapidas">Rapidas</option>
            <option value="vegetarianas">Vegetarianas</option>
            <option value="sin_gluten">Sin gluten</option>
            <option value="postres">Postres</option>-->
            <option value="aperitivos">Aperitivos</option>
            <option value="entrantes">Entrantes</option>
            <option value="primeros_platos">Primeros platos</option>
            <option value="segundos_platos">Segundos platos</option>
            <option value="postres">Postres</option>
            <option value="condimentos_salsas">Condimentos/Salsas</option>
          </select>
        </div>
        <div class="selectField orderField">
          <label for="orderSelect">Ordenar</label>
          <select id="orderSelect">
            <option value="popular">Mas populares</option>
            <option value="nuevas">Mas recientes</option>
            <option value="valoradas">Mejor valoradas</option>
          </select>
        </div>
        <button class="primaryButton">Aplicar</button>
      </section>

      <section class="recipesGrid" id="recipesGrid"></section>

      <section class="pagination">
        <button class="ghostButton" aria-label="Pagina anterior" id="prevPage">Anterior</button>
        <div class="pageIndicators" id="pagination"></div>
        <button class="ghostButton" aria-label="Pagina siguiente" id="nextPage">Siguiente</button>
      </section>
    </div>
  </main>

  <!-- Pie de página -->
  <footer>
    <div class="container">
      <div class="footerLegalInfo">
        <h4>Informacion Legal</h4>
        <ul>
          <li><a href="">FAQS</a></li>
          <li><a href="">Aviso Legal</a></li>
        </ul>
      </div>
      <div class="footerContactInfo">
        <h4>Contacto</h4>
        <ul>
          <li><a href="">info@cookit.com</a></li>
          <li><a href="">+34 666554433</a></li>
        </ul>
      </div>
      <div class="imgSection">
        <img src="img/cookitLogoV.png" alt="Logotipo de Cookit." loading="lazy" decoding="async">
      </div>
    </div>
    <div class="footerCredits">
      <p>&copy; 2025 Todos los derechos reservados</p>
    </div>
  </footer>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
